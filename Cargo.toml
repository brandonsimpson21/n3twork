[package]
name = "n3twork"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bytes = { version = "1.5.0", features = ["serde"] }
chrono = { version = "0.4.31", features = ["serde"] }
crossbeam-deque = "0.8.3"
dns-lookup = "2.0.3"
etherparse = "0.13.0"
hyper = { version = "0.14.27", features = ["full"] }
hyper-rustls = { version = "0.24.1", features = ["http2", "webpki-roots", "webpki-tokio"] }
indexmap = { version = "2.0.2", features = ["serde", "rayon"] }
libc = "0.2.149"
quinn = "0.10.2"
ring = "0.17.3"
rustls = { version = "0.21.7", features = ["read_buf", "quic", "secret_extraction"] }
serde = { version = "1.0.188", features = ["derive", "alloc"] }
serde_json = { version = "1.0.107", features = ["alloc"] }
slab = { version = "0.4.9", features = ["serde"] }
thiserror = "1.0.49"
tokio = { version = "1.33.0", features = ["full"] }
tokio-stream = { version = "0.1.14", features = ["full"] }
tracing = "0.1.37"
uuid = { version = "1.4.1", features = ["v4", "atomic", "wasm-bindgen", "zerocopy", "rand", "serde", "v7"] }